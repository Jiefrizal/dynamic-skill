{% extends "layout/base.html" %}

{% block title %}
Dynamic Skill
{% endblock %}

{% block content %}

<section
    class="hero"
    {% if hero_image %}
    style="--hero-image: url('{{ url_for('static', filename='images/hero/' ~ hero_image) }}');"
    {% endif %}
>
    <div class="container hero-content">
        <h1 class="hero-title">
            Don't be the same, be better with Dynamic Skill
        </h1>
        <div class="hero-action">
            <a href="{{ url_for('consultation') }}" class="btn btn-warning btn-lg">
                Konsultasi Sekarang
            </a>
        </div>
    </div>
</section>

<section class="stats-section py-5 bg-light">
    <div class="container">
        <div class="row text-center g-4">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">100+</h2>
                    <p class="stat-label">Program Training</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">50+</h2>
                    <p class="stat-label">Perusahaan Klien</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">5000+</h2>
                    <p class="stat-label">Peserta</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">10+</h2>
                    <p class="stat-label">Tahun Pengalaman</p>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
