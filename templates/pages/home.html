{% extends "layout/base.html" %}

{% block title %}
Dynamic Skill
{% endblock %}

{% block content %}

<style>
.hero {
    position: relative;
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;   /* clipping hanya untuk gambar */
    line-height: 0;
    border-radius: 0 !important;
}

.hero-img {
    width: 100%;
    height: auto;
    display: block;
    margin: 0;
    padding: 0;
    border-radius: 0 !important;
    max-width: none;
}

.hero-title-bar {
    width: 100%;
    background: #fff;
    padding: 1.5rem 1rem;
    text-align: center;
}

.hero-title-bar .hero-title {
    font-size: 2.25rem;
    font-weight: 700;
    line-height: 1.3;
    margin: 0;
    color: #1a1a1a;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
}

@media (max-width: 768px) {
    .hero-title-bar .hero-title {
        font-size: 1.4rem;
    }
    .hero-title-bar {
        padding: 1.25rem 1rem;
    }
}

@media (max-width: 480px) {
    .hero-title-bar .hero-title {
        font-size: 1.15rem;
    }
}

/* Stats section */
.stats-section {
    padding: 3rem 0;
}

.stats-section .stat-card {
    padding: 1rem;
}

.stats-section .stat-number {
    color: #0d6efd;
    font-weight: 700;
    font-size: 2.25rem;
    margin-bottom: 0.25rem;
}

.stats-section .stat-label {
    color: #333;
    margin: 0;
}

@media (max-width: 768px) {
    .stats-section {
        padding-top: 5px !important;
        margin-top: 0px;
    }
}
</style>

<section class="hero">
    {% if hero_image %}
    <img
        class="hero-img"
        src="{{ url_for('static', filename='images/hero/' ~ hero_image) }}"
        alt="Dynamic Skill Hero"
    >
    {% endif %}
</section>

<div class="hero-title-bar">
    <h1 class="hero-title">
        Don't be the same, be better with Dynamic Skill
    </h1>
</div>

<section class="stats-section py-5 bg-light">
    <div class="container">
        <div class="row text-center g-4">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">100+</h2>
                    <p class="stat-label">Program Training</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">50+</h2>
                    <p class="stat-label">Perusahaan Klien</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">5000+</h2>
                    <p class="stat-label">Peserta</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h2 class="stat-number">10+</h2>
                    <p class="stat-label">Tahun Pengalaman</p>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
