{% extends "layout/base.html" %}

{% block title %}
Konsultasi - Dynamic Skill
{% endblock %}

{% block content %}

<section class="consultation-page">

    <div class="container">

        <div class="text-center mb-5">
            <h1>Konsultasi Sekarang</h1>
            <p>
                Sampaikan kebutuhan Anda, tim Dynamic Skill siap membantu.
            </p>
        </div>


        <div class="consultation-card">

            <form method="POST">

                <div class="mb-3">
                    <label>Nama</label>
                    <input type="text" 
                           name="name" 
                           class="form-control">
                </div>


                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" 
                           name="email" 
                           class="form-control">
                </div>


                <div class="mb-3">
                    <label>Layanan</label>
                    <input type="text" 
                           name="service" 
                           class="form-control">
                </div>


                <div class="mb-3">
                    <label>Waktu Preferensi</label>
                    <input type="text" 
                           name="preferred" 
                           class="form-control">
                </div>


                <div class="mb-3">
                    <label>Pesan</label>
                    <textarea name="message"
                              class="form-control"></textarea>
                </div>


                <button class="btn btn-warning">
                    Kirim Konsultasi
                </button>

            </form>

        </div>

    </div>

</section>


{% endblock %}
